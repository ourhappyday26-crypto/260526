<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Антон и Юлия</title>
  <style>
    :root {
      --paper: rgba(255, 252, 247, 0.9);
      --paper-strong: rgba(255, 254, 251, 0.96);
      --line: rgba(185, 173, 147, 0.62);
      --shadow: 0 20px 48px rgba(126, 116, 96, 0.12);
      --text: #564f46;
      --muted: #81776a;
      --accent: #6f7f78;
      --accent-soft: #dfe5df;
      --gold: #b3a27d;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      padding: 18px;
      color: var(--text);
      background:
        radial-gradient(circle at top right, rgba(196, 206, 198, 0.36), transparent 30%),
        radial-gradient(circle at bottom left, rgba(214, 204, 184, 0.36), transparent 28%),
        linear-gradient(180deg, #faf7f1 0%, #f4efe6 100%);
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      display: grid;
      place-items: center;
    }

    .card {
      width: min(760px, 100%);
      padding: 28px 18px 20px;
      background: var(--paper);
      border: 1px solid var(--line);
      border-radius: 28px;
      box-shadow: var(--shadow);
      position: relative;
      overflow: hidden;
      backdrop-filter: blur(7px);
    }

    .card::before {
      content: "";
      position: absolute;
      inset: 14px;
      border: 1.2px solid rgba(179, 162, 125, 0.88);
      border-radius: 22px;
      pointer-events: none;
    }

    .card > * {
      position: relative;
      z-index: 1;
    }

    .hero {
      text-align: center;
      padding: 12px 8px 8px;
    }

    h1,
    h2 {
      font-family: "Palatino Linotype", "Book Antiqua", Georgia, serif;
      font-weight: 400;
    }

    h1 {
      font-size: clamp(34px, 7vw, 54px);
      line-height: 1.02;
      color: #62706a;
      letter-spacing: 0.05em;
      margin-bottom: 8px;
    }

    .hero-subtitle {
      font-family: "Palatino Linotype", "Book Antiqua", Georgia, serif;
      font-size: clamp(21px, 4.5vw, 30px);
      line-height: 1.15;
      color: #7a7064;
    }

    .section {
      margin-top: 16px;
      padding: 18px;
      border-radius: 22px;
      background: var(--paper-strong);
      border: 1px solid rgba(192, 181, 156, 0.46);
    }

    .section h2 {
      text-align: center;
